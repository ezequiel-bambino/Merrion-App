<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Merrion Shop</title>

<style>
body{
  font-family:Arial;
  text-align:center;
  padding:20px;
}

/* LOGO */
.logo{
  width:200px;
  margin:auto;
  display:block;
  margin-bottom:10px;
}

/* TITLE */
.title{
  font-size:28px; 
  font-weight:bold;
  margin-top:10px;
}

.date{
  font-size:14px;
  color:#777;
  margin-bottom:15px;
}

.tabBtn{
  padding:15px 25px;
  margin:5px;
  font-size:22px; 
}

.section{
  display:none;
}

.active{
  display:block;
}

.left{
  max-width:500px;
  margin:0 auto;
}

/* WEATHER + TRAFFIC MÁS ESPACIADO */
.row{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin:20px 0; /* MÁS espacio entre renglones */
}

/* DROPDOWNS MÁS CORTOS Y CENTRADOS */
.row select{
  width:300px; /* mitad de antes */
  font-size:20px;
  text-align:center;
}

.row select option{
  text-align:center;
}

/* STOCK INFO GRID */
#stockForm{
  display:grid;
  grid-template-columns: 1fr 100px 100px; /* más compactos */
  gap:12px 20px;
  align-items:center;
  margin-top:10px;
}

#stockForm span{
  text-align:left;
  font-size:20px;
}

#stockForm .header{
  font-weight:bold;
  font-size:22px;
}

/* INPUTS MÁS CORTOS Y CENTRADOS */
#stockForm input{
  font-size:20px;
  padding:6px;
  width:100%;
  text-align:center; /* CENTRADO */
  box-sizing:border-box;
}

.bigInput{
  font-size:22px;
  width:220px;
  text-align:center;
  margin:20px auto 15px;
}

button{
  margin-top:20px;
  font-size:22px;
}

.hidden{
  display:none;
}

#lastUpdate{
  margin-top:10px;
}

/* LAST DROP */
#dropData{
  display:grid;
  grid-template-columns: auto 60px;
  justify-content:center;
  gap:20px;
  row-gap:6px;
  margin-top:10px;
}

#dropData .header{
  font-weight:bold;
  font-size:22px;
}

#dropData .cell{
  text-align:left;
  font-size:20px;
}
#dropData .cell.qty{
  text-align:right;
}
</style>
</head>

<body>

<img src="icon.png" class="logo">

<div class="title">MERRION SHOP</div>
<div id="todayDate" class="date"></div>

<button class="tabBtn" onclick="showTab('stock')">Stock Form</button>
<button class="tabBtn" onclick="showTab('drop')">Last Drop</button>

<!-- STOCK -->
<div id="stock" class="section">

<input id="stockUser" class="bigInput" placeholder="Your name">

<div class="left">

<div class="row">
  <span>Weather Forecast</span>
  <select id="weather" required>
    <option value=""></option>
    <option>Sunny</option>
    <option>Cloudy</option>
    <option>Rainy</option>
    <option>Storm</option>
  </select>
</div>

<div class="row">
  <span>How's today going?</span>
  <select id="traffic" required>
    <option value=""></option>
    <option>Quiet</option>
    <option>Normal</option>
    <option>Busy</option>
  </select>
</div>

<h3>Stock Info</h3>

<div id="stockForm"></div>

<button id="submitStockBtn" onclick="submitStock()">Submit Stock</button>
<button id="newBtn" class="hidden" onclick="resetForm()">New Submit</button>
<div id="lastUpdate" class="hidden"></div>

</div>
</div>

<!-- DROP -->
<div id="drop" class="section">
  <h3>Last Drop Info</h3>
  <div id="dropData">
    <div class="header cell">Pizza</div>
    <div class="header cell qty">QTY</div>
  </div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbzCkV1ETniuZLTvxvV4IJNJ2hoRBs_0qyTOCtyhxMS4QHAxDDGVdl8O3JCSnGOj0G8a/exec";

/* DATE */
function setDate(){
  const today = new Date();
  document.getElementById("todayDate").innerText =
    today.toLocaleDateString('en-GB',{
      weekday:'long',
      day:'numeric',
      month:'long'
    });
}

/* TAB */
function showTab(tab){
  document.querySelectorAll(".section")
    .forEach(s => s.classList.remove("active"));

  document.getElementById(tab).classList.add("active");

  if(tab === "stock"){
    if(!window.loaded){
      loadPizzas();
      window.loaded = true;
    }
  }

  if(tab === "drop"){
    loadDrop();
  }
}

/* LOAD PIZZAS */
async function loadPizzas(){
  const res = await fetch(`${URL}?action=getPizzas`);
  const pizzas = await res.json();

  const formDiv = document.getElementById("stockForm");
  formDiv.innerHTML = `
    <span class="header">Pizza</span>
    <span class="header">Whole pies</span>
    <span class="header">Slices</span>
  `;

  pizzas.forEach(p=>{
    formDiv.innerHTML += `
      <span><b>${p}</b></span>
      <input id="whole_${p}" type="number" min="0">
      <input id="slice_${p}" type="number" min="0">
    `;
  });
}

/* VALIDACIÓN + SUBMIT */
async function submitStock(){

  const user = document.getElementById("stockUser").value;
  const weather = document.getElementById("weather").value;
  const traffic = document.getElementById("traffic").value;

  if(!user || !weather || !traffic){
    alert("Complete all fields");
    return;
  }

  const pizzas=[];
  let valid=true;

  document.querySelectorAll("[id^=whole_]").forEach(i=>{
    const name = i.id.replace("whole_","");
    const whole = i.value;
    const slice = document.getElementById("slice_" + name).value;

    if(whole === "" || slice === ""){
      valid=false;
    }

    const total = Number(whole) + Number(slice)/8; /* NUEVA FÓRMULA */
    pizzas.push({name, qty: total});
  });

  if(!valid){
    alert("Fill all pizza fields");
    return;
  }

  if(!confirm("Are you sure?")) return;

  const res = await fetch(`${URL}?action=submitStock&data=${encodeURIComponent(JSON.stringify({
    user, weather, traffic, pizzas
  }))}`);

  const data = await res.json();

  alert("Submitted");

  localStorage.setItem("lastStockSubmit", JSON.stringify({
    user, weather, traffic, pizzas, timestamp: data.timestamp
  }));
}

/* DROP */
async function loadDrop(){
  const res = await fetch(`${URL}?action=getLastDrop`);
  const data = await res.json();

  const div = document.getElementById("dropData");
  div.innerHTML = `
    <div class="header cell">Pizza</div>
    <div class="header cell qty">QTY</div>
  `;

  data.forEach(d=>{
    div.innerHTML += `
      <div class="cell">${d.pizza}</div>
      <div class="cell qty">${d.lastDrop}</div>
    `;
  });
}

setDate();
</script>

</body>
</html>
