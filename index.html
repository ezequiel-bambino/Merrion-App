<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Merrion Shop</title>

<style>
body{font-family:Arial;text-align:center;padding:20px;}
.logo{width:200px;margin:auto;display:block;margin-bottom:10px;}
.title{font-size:28px;font-weight:bold;margin-top:10px;}
.date{font-size:14px;color:#777;margin-bottom:15px;}
.tabBtn{padding:15px 25px;margin:5px;font-size:22px;}
.section{display:none;}
.active{display:block;}
.left{max-width:500px;margin:0 auto;}
.row{margin:16px 0;}
.row select{width:300px;font-size:20px;display:block;margin:0 auto;text-align:center;text-align-last:center;}
#stockForm,#closingForm{display:grid;gap:12px 20px;align-items:center;}
#stockForm{grid-template-columns:1fr 100px 100px;}
#closingForm{grid-template-columns:1fr 100px 100px 120px;}
.header{font-weight:bold;font-size:22px;text-align:left;}
.bold{font-weight:bold;}
input{font-size:20px;padding:6px;width:80px;text-align:center;box-sizing:border-box;margin:auto;}
.bigInput{font-size:22px;width:220px;text-align:center;margin:20px auto 15px;}
button{margin-top:20px;font-size:22px;}
.hidden{display:none;}
#dropData{display:grid;grid-template-columns:auto 60px;justify-content:center;gap:20px;row-gap:6px;margin-top:10px;}
#dropData .header{font-weight:bold;font-size:22px;}
#dropData .qty{text-align:right;}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;justify-content:center;align-items:center;}
.modal-box{background:#fff;padding:20px;border-radius:10px;width:300px;}
.spinner{border:4px solid #ddd;border-top:4px solid #333;border-radius:50%;width:20px;height:20px;animation:spin 1s linear infinite;display:inline-block;margin-left:10px;}
@keyframes spin{100%{transform:rotate(360deg);}}
</style>
</head>

<body>
<img src="icon.png" class="logo">
<div class="title">MERRION SHOP</div>
<div id="todayDate" class="date"></div>

<button class="tabBtn" onclick="UI.showTab('stock')">Stock Form</button>
<button class="tabBtn" onclick="UI.showTab('drop')">Last Drop</button>
<button class="tabBtn" onclick="UI.showTab('closing')">Closing Form</button>

<div id="stock" class="section">
<input id="stockUser" class="bigInput" placeholder="Your name">
<div class="left">
<div class="row"><span>Weather</span><select id="weather"><option></option><option>Sunny</option><option>Cloudy</option><option>Rainy</option><option>Storm</option></select></div>
<div class="row"><span>Traffic</span><select id="traffic"><option></option><option>Quiet</option><option>Normal</option><option>Busy</option></select></div>
<h3>Stock Info</h3>
<div id="stockForm"></div>
<button id="submitStockBtn" onclick="Stock.submit()">Submit Stock</button>
<button id="newStockBtn" class="hidden" onclick="Stock.reset(true)">New Submit</button>
<div id="stockStatus"></div>
</div></div>

<div id="drop" class="section">
<h3>Last Drop Info</h3>
<div id="dropData"></div>
</div>

<div id="closing" class="section">
<input id="closingUser" class="bigInput" placeholder="Your name">
<div class="left">
<h3>Closing Info</h3>
<div id="closingForm"></div>
<button id="submitClosingBtn" onclick="Closing.submit()">Submit Log</button>
<button id="newClosingBtn" class="hidden" onclick="Closing.reset(true)">New Submit</button>
<div id="closingStatus"></div>
</div></div>

<div id="modal" class="modal"><div class="modal-box"><p id="modalText"></p><button onclick="UI.closeModal()">OK</button></div></div>

<script>
const URL="https://script.google.com/macros/s/AKfycby2Tz7rFagfnPhr7wXRnSPjJyXiitZwYlhLlvm_YqRGdI8ept-6CXHXqGzQ5IERmFAh/exec";

const State={stock:"editing",closing:"editing"};

const UI={
showTab(tab){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(tab).classList.add('active');
if(tab==='stock'&&!window.stockLoaded)Stock.load();
if(tab==='drop')Drop.load();
if(tab==='closing'&&!window.closingLoaded)Closing.load();
},
modal(msg){document.getElementById('modalText').innerText=msg;document.getElementById('modal').style.display='flex';},
closeModal(){document.getElementById('modal').style.display='none';}
};

function setLoading(btn,loading){btn.disabled=loading;btn.innerHTML=loading?"Saving...":btn.dataset.label;}

function saveState(key,data){localStorage.setItem(key,JSON.stringify(data));}
function loadState(key){return JSON.parse(localStorage.getItem(key)||"{}");}

const Stock={
async load(){
const res=await fetch(`${URL}?action=getPizzas`);
const pizzas=await res.json();
const form=document.getElementById('stockForm');
form.innerHTML="<div class='header'>Pizza</div><div class='header'>Whole</div><div class='header'>Slices</div>";
pizzas.forEach(p=>form.innerHTML+=`<span class='bold'>${p}</span><input id='w_${p}'><input id='s_${p}'>`);
window.stockLoaded=true;
this.restore();
},
restore(){const s=loadState('stock');if(!s.user)return;
document.getElementById('stockUser').value=s.user||'';
document.getElementById('weather').value=s.weather||'';
document.getElementById('traffic').value=s.traffic||'';
if(s.pizzas){s.pizzas.forEach(p=>{const w=document.getElementById('w_'+p.name);const sl=document.getElementById('s_'+p.name);if(w)w.value=p.w;if(sl)sl.value=p.s;});}
},
async submit(){if(State.stock!=='editing')return;
const btn=document.getElementById('submitStockBtn');btn.dataset.label=btn.innerText;setLoading(btn,true);
const user=document.getElementById('stockUser').value;
const weather=document.getElementById('weather').value;
const traffic=document.getElementById('traffic').value;
if(!user||!weather||!traffic){UI.modal('Fill all fields');setLoading(btn,false);return;}
if(!confirm('Confirm submit?')){setLoading(btn,false);return;}
const pizzas=[];
document.querySelectorAll('[id^=w_]').forEach(i=>{
const n=i.id.replace('w_','');pizzas.push({name:n,w:Number(i.value||0),s:Number(document.getElementById('s_'+n).value||0)});
});
const res=await fetch(`${URL}?action=submitStock&data=${encodeURIComponent(JSON.stringify({user,weather,traffic,pizzas}))}`);
const d=await res.json();
State.stock='submitted';
saveState('stock',{user,weather,traffic,pizzas});
document.getElementById('stockStatus').innerText='Saved '+new Date(d.timestamp).toLocaleString();setLoading(btn,false);
},
reset(full){localStorage.removeItem('stock');if(full)location.reload();}
};

const Closing={
async load(){const res=await fetch(`${URL}?action=getPizzas`);const pizzas=await res.json();const f=document.getElementById('closingForm');f.innerHTML="<div class='header'>Pizza</div><div class='header'>Waste Pies</div><div class='header'>Waste Slices</div><div class='header'>Time</div>";
pizzas.forEach(p=>f.innerHTML+=`<span class='bold'>${p}</span><input id='cw_${p}'><input id='cs_${p}'><input type='time' id='ct_${p}'>`);
window.closingLoaded=true;this.restore();},
restore(){const s=loadState('closing');if(!s.user)return;
document.getElementById('closingUser').value=s.user||'';
if(s.pizzas){s.pizzas.forEach(p=>{const w=document.getElementById('cw_'+p.name);const s2=document.getElementById('cs_'+p.name);const t=document.getElementById('ct_'+p.name);if(w)w.value=p.w;if(s2)s2.value=p.s;if(t)t.value=p.t;});}},
async submit(){if(State.closing!=='editing')return;
const btn=document.getElementById('submitClosingBtn');btn.dataset.label=btn.innerText;setLoading(btn,true);
const user=document.getElementById('closingUser').value;
if(!user){UI.modal('Enter name');setLoading(btn,false);return;}
if(!confirm('Confirm submit?')){setLoading(btn,false);return;}
const pizzas=[];
document.querySelectorAll('[id^=cw_]').forEach(i=>{
const n=i.id.replace('cw_','');pizzas.push({name:n,w:Number(i.value||0),s:Number(document.getElementById('cs_'+n).value||0),t:document.getElementById('ct_'+n).value});
});
const res=await fetch(`${URL}?action=submitClosing&data=${encodeURIComponent(JSON.stringify({user,pizzas}))}`);
const d=await res.json();
State.closing='submitted';
saveState('closing',{user,pizzas});
document.getElementById('closingStatus').innerText='Saved '+new Date(d.timestamp).toLocaleString();setLoading(btn,false);
},
reset(full){localStorage.removeItem('closing');if(full)location.reload();}
};

const Drop={async load(){const res=await fetch(`${URL}?action=getLastDrop`);const d=await res.json();const div=document.getElementById('dropData');div.innerHTML='<div class=header>Pizza</div><div class=header>Qty</div>';d.forEach(x=>div.innerHTML+=`<div>${x.pizza}</div><div class=qty>${x.lastDrop}</div>`);}};
</script>
</body>
</html>
