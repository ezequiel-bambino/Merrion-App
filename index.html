<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BAMBINO PIZZAS</title>
<style>
body{font-family:Arial;padding:20px;text-align:center;}
.logo{width:200px;margin:auto;display:block;margin-bottom:10px;}
h1{font-size:32px;margin-bottom:5px;}
.date{color:#777;margin-bottom:20px;}
.tab-buttons button{padding:10px 18px;font-size:18px;margin:4px;}
.row{display:grid;grid-template-columns:auto 90px 90px;gap:10px;align-items:center;max-width:600px;margin:auto;margin-bottom:14px;}
.ingredient{font-weight:bold;text-align:left;}
.unit{font-size:13px;color:#666;text-align:left;}
.row input{height:40px;font-size:16px;text-align:center;}
#chefName{width:240px;height:40px;font-size:18px;margin-bottom:10px;text-align:center;}
#submitBtn{padding:8px 16px;font-size:16px;margin-top:10px;}
.dataTable{width:100%;max-width:650px;margin:auto;border-collapse:collapse;}
.dataTable th{text-align:center;padding:10px;border-bottom:2px solid #ddd;font-size:15px;}
.dataTable td{padding:10px;border-bottom:1px solid #eee;font-size:16px;text-align:center;}
</style>
</head>
<body>

<img src="icon.png" class="logo">
<h1>BAMBINO PIZZAS</h1>
<div id="todayDate" class="date"></div>

<div class="tab-buttons">
<button onclick="showTab('form')">Pizza Form</button>
<button onclick="showTab('last')">Last Drop</button>
</div>

<div id="tab"></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwhQYqY6awu-gO-9HFMGHYZzPJ8rMsQFTO5gCByOgaPp8_6_K55A8e-YlMT7OVUM5X8/exec";

document.getElementById("todayDate").innerText =
new Date().toLocaleDateString('en-GB',{weekday:'long',day:'2-digit',month:'long'});

function showTab(tab){
  document.getElementById("tab").innerHTML="";
  if(tab==='form') loadForm();
  if(tab==='last') loadLastDrop();
}

/* ===============================
   FORM TAB
================================ */
async function loadForm(){
  const res = await fetch(SCRIPT_URL);
  const pizzasData = await fetch(SCRIPT_URL+"?action=getPizzas").then(r=>r.json());
  
  const tab = document.getElementById("tab");
  tab.innerHTML=`
    <input id="chefName" placeholder="Chef name">
    <select id="weatherSelect">
      <option value="">Weather forecast</option>
      <option>Sunny</option>
      <option>Cloudy</option>
      <option>Rainy</option>
      <option>Storm</option>
    </select>
    <select id="trafficSelect">
      <option value="">Traffic</option>
      <option>Quiet</option>
      <option>Normal</option>
      <option>Busy</option>
    </select>
  `;
  
  const container=document.createElement("div");
  container.id="formRows";
  tab.appendChild(container);

  pizzasData.forEach(p=>{
    const row=document.createElement("div");
    row.className="row";
    row.innerHTML=`
      <div class="ingredient">${p.name}</div>
      <input type="number" placeholder="Stock Level" id="stock_${p.name}">
      <input type="number" placeholder="Sold Pizza" id="sold_${p.name}">
    `;
    container.appendChild(row);
  });

  const submit = document.createElement("button");
  submit.id="submitBtn";
  submit.innerText="SUBMIT";
  submit.onclick=submitForm;
  tab.appendChild(submit);
}

/* ===============================
   SUBMIT FORM
================================ */
async function submitForm(){
  const chef = document.getElementById("chefName").value;
  const weather = document.getElementById("weatherSelect").value;
  const traffic = document.getElementById("trafficSelect").value;

  if(!chef){ alert("Chef name required"); return;}
  if(!weather){ alert("Select weather"); return;}
  if(!traffic){ alert("Select traffic"); return;}

  const rows = document.querySelectorAll(".row");
  const pizzas = [];
  rows.forEach(r=>{
    const name = r.querySelector(".ingredient").innerText;
    const stockLevel = Number(r.querySelector("#stock_"+name).value)||0;
    const soldPizza = Number(r.querySelector("#sold_"+name).value)||0;
    pizzas.push({name, stockLevel, soldPizza});
  });

  const payload = {chef, weather, traffic, pizzas};

  await fetch(SCRIPT_URL+"?action=submitPizzaForm&data="+encodeURIComponent(JSON.stringify(payload)));
  alert("Form submitted!");
  showTab('form');
}

/* ===============================
   LAST DROP TAB
================================ */
async function loadLastDrop(){
  const data = await fetch(SCRIPT_URL+"?action=getLastDrop").then(r=>r.json());
  let html = `<table class="dataTable">
  <tr><th>Pizza</th><th>Last Drop</th></tr>`;
  data.forEach(r=>{
    html+=`<tr><td>${r.pizza}</td><td>${r.lastDrop}</td></tr>`;
  });
  html+="</table>";
  document.getElementById("tab").innerHTML=html;
}

</script>
</body>
</html>
