<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Merrion Shop</title>

<style>

body{
  font-family:Arial;
  text-align:center;
  padding:20px;
}

.logo{
  width:140px;
  margin:auto;
  display:block;
}

.title{
  font-size:26px;
  margin-top:10px;
}

.date{
  font-size:14px;
  color:#777;
  margin-bottom:15px;
}

.tabBtn{
  padding:10px 15px;
  margin:5px;
  font-size:16px;
}

.section{
  display:none;
}

.active{
  display:block;
}

.left{
  text-align:left;
  max-width:400px;
  margin:auto;
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:10px 0;
}

input{
  width:80px;
  font-size:18px;
  text-align:center;
}

select{
  width:150px;
  font-size:16px;
}

.bigInput{
  font-size:20px;
  width:200px;
  text-align:center;
  margin-bottom:15px;
}

button{
  margin-top:20px;
  font-size:20px;
}

.hidden{
  display:none;
}

.bold{
  font-weight:bold;
}

</style>
</head>

<body>

<img src="icon.png" class="logo">

<div class="title">MERRION SHOP</div>
<div id="todayDate" class="date"></div>

<button class="tabBtn" onclick="showTab('sales')">Sales Form</button>
<button class="tabBtn" onclick="showTab('stock')">Stock Form</button>
<button class="tabBtn" onclick="showTab('drop')">Last Drop</button>

<div id="lastUpdate" class="date hidden"></div>
<button id="newBtn" class="hidden" onclick="resetForm()">New Submit</button>

<!-- SALES -->
<div id="sales" class="section">

<input id="salesUser" class="bigInput" placeholder="Your name">

<div class="left">

<div class="row">
  <span>Weather Forecast</span>
  <select id="weather">
    <option value=""></option>
    <option>Sunny</option>
    <option>Cloudy</option>
    <option>Rainy</option>
    <option>Storm</option>
  </select>
</div>

<div class="row">
  <span>How's today going?</span>
  <select id="traffic">
    <option value=""></option>
    <option>Quiet</option>
    <option>Normal</option>
    <option>Busy</option>
  </select>
</div>

<h3 style="text-align:center;">Sales Info</h3>

<div id="salesForm"></div>

</div>

<button onclick="submitSales()">Submit Sales</button>

</div>


<!-- STOCK -->
<div id="stock" class="section">

<input id="stockUser" class="bigInput" placeholder="Your name">

<div class="left">

<h3 style="text-align:center;">Stock Info</h3>

<div id="stockForm"></div>

</div>

<button onclick="submitStock()">Submit Stock</button>

</div>


<!-- DROP -->
<div id="drop" class="section">
<h3>Last Drop Info</h3>
<div id="dropData"></div>
</div>


<script>

const URL = "https://script.google.com/macros/s/AKfycbygCgjhyeD8TWDWPXsN30m4876sVgeEtoqFhyLvDCTk1QII4tILZZgVXw7pWYbhIGli/exec";

/* DATE */
function setDate(){
  const today = new Date();
  document.getElementById("todayDate").innerText =
    today.toLocaleDateString('en-GB',{
      weekday:'long',
      day:'numeric',
      month:'long'
    });
}


/* TAB CONTROL */
function showTab(tab){

  document.querySelectorAll(".section")
    .forEach(s => s.classList.remove("active"));

  document.getElementById(tab).classList.add("active");

  if(tab === "sales" || tab === "stock"){
    if(!window.loaded){
      loadPizzas();
      window.loaded = true;
    }
  }

  if(tab === "drop"){
    loadDrop();
  }
}


/* LOAD PIZZAS */
async function loadPizzas(){

  const res = await fetch(`${URL}?action=getPizzas`);
  const pizzas = await res.json();

  pizzas.forEach(p=>{

    document.getElementById("salesForm").innerHTML += `
      <div class="row">
        <span class="bold">${p}</span>
        <input id="sales_${p}" type="number">
      </div>
    `;

    document.getElementById("stockForm").innerHTML += `
      <div class="row">
        <span class="bold">${p}</span>
        <input id="stock_${p}" type="number">
      </div>
    `;

  });
}


/* BLOCK FORM */
function blockForm(){
  document.querySelectorAll("input, select, button")
    .forEach(el=>{
      if(el.id !== "newBtn") el.disabled = true;
    });
}


/* LAST UPDATE */
function showLastUpdate(date){
  const d = new Date(date);
  const text = d.toLocaleDateString('en-GB') +
    " at " + d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});

  const el = document.getElementById("lastUpdate");
  el.innerText = "Last update at " + text;
  el.classList.remove("hidden");

  document.getElementById("newBtn").classList.remove("hidden");
}


/* RESET */
function resetForm(){
  location.reload();
}


/* SUBMIT SALES */
async function submitSales(){

  if(!confirm("Are you sure?")) return;

  blockForm();

  const user = document.getElementById("salesUser").value;
  const weather = document.getElementById("weather").value;
  const traffic = document.getElementById("traffic").value;

  const pizzas=[];

  document.querySelectorAll("[id^=sales_]").forEach(i=>{
    pizzas.push({
      name: i.id.replace("sales_",""),
      qty: Number(i.value)||0
    });
  });

  const res = await fetch(`${URL}?action=submitSales&data=${encodeURIComponent(JSON.stringify({
    user, weather, traffic, pizzas
  }))}`);

  const data = await res.json();

  alert("Submitted");

  showLastUpdate(data.timestamp);
}


/* SUBMIT STOCK */
async function submitStock(){

  if(!confirm("Are you sure?")) return;

  blockForm();

  const user = document.getElementById("stockUser").value;

  const pizzas=[];

  document.querySelectorAll("[id^=stock_]").forEach(i=>{
    pizzas.push({
      name: i.id.replace("stock_",""),
      qty: Number(i.value)||0
    });
  });

  const res = await fetch(`${URL}?action=submitStock&data=${encodeURIComponent(JSON.stringify({
    user, pizzas
  }))}`);

  const data = await res.json();

  alert("Submitted");

  showLastUpdate(data.timestamp);
}


/* LOAD DROP */
async function loadDrop(){

  const res = await fetch(`${URL}?action=getLastDrop`);
  const data = await res.json();

  const div = document.getElementById("dropData");
  div.innerHTML="";

  data.forEach(d=>{
    div.innerHTML += `
      <div class="row">
        <span>${d.pizza}</span>
        <b>${d.lastDrop}</b>
      </div>
    `;
  });
}


setDate();

</script>

</body>
</html>
