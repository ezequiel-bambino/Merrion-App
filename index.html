<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Bambino App</title>

<style>
body{
  font-family:Arial;
  text-align:center;
  padding:20px;
}

.tabBtn{
  font-size:18px;
  padding:10px 20px;
  margin:5px;
}

.section{
  display:none;
}

.active{
  display:block;
}

.row{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:10px;
}

input{
  width:80px;
  font-size:18px;
  text-align:center;
}

select{
  font-size:18px;
}

button{
  font-size:20px;
  margin-top:20px;
}
</style>
</head>

<body>

<h2>Bambino Control</h2>

<button class="tabBtn" onclick="showTab('sales')">Sales Form</button>
<button class="tabBtn" onclick="showTab('stock')">Stock Form</button>
<button class="tabBtn" onclick="showTab('drop')">Last Drop</button>

<!-- SALES FORM -->
<div id="sales" class="section">

<h3>Sales Form</h3>

<input id="salesUser" placeholder="Your name"><br><br>

<select id="weather">
  <option value="">Weather</option>
  <option>Sunny</option>
  <option>Cloudy</option>
  <option>Rainy</option>
  <option>Storm</option>
</select>

<select id="traffic">
  <option value="">Traffic</option>
  <option>Quiet</option>
  <option>Normal</option>
  <option>Busy</option>
</select>

<div id="salesForm"></div>

<button onclick="submitSales()">Submit Sales</button>

</div>


<!-- STOCK FORM -->
<div id="stock" class="section">

<h3>Stock Form</h3>

<input id="stockUser" placeholder="Your name"><br><br>

<div id="stockForm"></div>

<button onclick="submitStock()">Submit Stock</button>

</div>


<!-- LAST DROP -->
<div id="drop" class="section">

<h3>Last Drop Info</h3>

<div id="dropData"></div>

</div>


<script>

const URL = "https://script.google.com/macros/s/AKfycbyX7Jg77jmKU_N7UnZzP8nSwpnpnjwbFgvx8s3DtptlnYUl_VDZAb73uZ7K09_Jbpc2/exec";

/* TABS */

function showTab(tab){

  document.querySelectorAll(".section")
    .forEach(s => s.classList.remove("active"));

  document.getElementById(tab).classList.add("active");

  if(tab === "drop") loadDrop();
}


/* LOAD PIZZAS */

async function loadPizzas(){

  const res = await fetch(`${URL}?action=getPizzas`);
  const pizzas = await res.json();

  const salesDiv = document.getElementById("salesForm");
  const stockDiv = document.getElementById("stockForm");

  pizzas.forEach(p => {

    salesDiv.innerHTML += `
      <div class="row">
        <span>${p}</span>
        <input type="number" id="sales_${p}">
      </div>
    `;

    stockDiv.innerHTML += `
      <div class="row">
        <span>${p}</span>
        <input type="number" id="stock_${p}">
      </div>
    `;

  });

}


/* SUBMIT SALES */

async function submitSales(){

  const user = document.getElementById("salesUser").value;
  const weather = document.getElementById("weather").value;
  const traffic = document.getElementById("traffic").value;

  const inputs = document.querySelectorAll("[id^=sales_]");

  const pizzas=[];

  inputs.forEach(i=>{
    pizzas.push({
      name: i.id.replace("sales_",""),
      qty: Number(i.value)||0
    });
  });

  await fetch(`${URL}?action=submitSales&data=${encodeURIComponent(JSON.stringify({
    user, weather, traffic, pizzas
  }))}`);

  alert("Sales saved");
}


/* SUBMIT STOCK */

async function submitStock(){

  const user = document.getElementById("stockUser").value;

  const inputs = document.querySelectorAll("[id^=stock_]");

  const pizzas=[];

  inputs.forEach(i=>{
    pizzas.push({
      name: i.id.replace("stock_",""),
      qty: Number(i.value)||0
    });
  });

  await fetch(`${URL}?action=submitStock&data=${encodeURIComponent(JSON.stringify({
    user, pizzas
  }))}`);

  alert("Stock saved");
}


/* LOAD DROP */

async function loadDrop(){

  const res = await fetch(`${URL}?action=getLastDrop`);
  const data = await res.json();

  const div = document.getElementById("dropData");

  div.innerHTML="";

  data.forEach(d=>{
    div.innerHTML += `
      <div class="row">
        <span>${d.pizza}</span>
        <b>${d.lastDrop}</b>
      </div>
    `;
  });

}


/* INIT */

loadPizzas();
showTab('sales');

</script>

</body>
</html>
